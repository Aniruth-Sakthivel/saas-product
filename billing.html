<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']},colors:{indigo:{600:'#4F46E5'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:8px}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/shell.js"></script>
  <script>
    const H=window.HOTEL, U=window.UI;
    const outstanding=H.invoices.filter(i=>i.status==="Pending"||i.status==="Overdue");
    const paid=H.invoices.filter(i=>i.status==="Paid");
    const totalOut=outstanding.reduce((s,i)=>s+i.amount,0);
    const totalPaid=paid.reduce((s,i)=>s+i.amount,0);

    const kpis=`<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
      ${U.kpiCard({label:"Revenue (30d)",value:U.money(totalPaid),delta:"11%",deltaUp:true,icon:"banknote"})}
      ${U.kpiCard({label:"Outstanding",value:U.money(totalOut),delta:"4%",deltaUp:false,icon:"clock",sub:outstanding.length+" open invoices"})}
      ${U.kpiCard({label:"Paid invoices",value:paid.length,icon:"check-circle-2",sub:"this month"})}
      ${U.kpiCard({label:"Avg. invoice",value:U.money(Math.round(totalPaid/(paid.length||1))),icon:"receipt"})}
    </div>`;

    function invRow(i){
      return `<tr class="hover:bg-gray-50">
        <td class="px-5 py-3 text-sm font-medium text-indigo-600">${i.id}</td>
        <td class="px-5 py-3"><div class="flex items-center gap-2.5">${U.avatar(i.initials)}<span class="text-sm text-gray-700">${i.guest}</span></div></td>
        <td class="px-5 py-3 text-sm font-semibold text-gray-900">${U.money(i.amount)}</td>
        <td class="px-5 py-3">${U.badge(i.status)}</td>
        <td class="px-5 py-3 text-sm text-gray-600">${i.method}</td>
        <td class="px-5 py-3 text-right"><button class="rounded-lg border border-gray-200 px-2.5 py-1 text-xs font-medium text-gray-600 hover:bg-gray-50">View</button></td>
      </tr>`;
    }
    const head=`<thead><tr class="border-b border-gray-100 bg-gray-50/60 text-left text-xs font-medium uppercase tracking-wide text-gray-400">
      <th class="px-5 py-2.5">Invoice</th><th class="px-5 py-2.5">Guest</th><th class="px-5 py-2.5">Amount</th><th class="px-5 py-2.5">Status</th><th class="px-5 py-2.5">Method</th><th class="px-5 py-2.5"></th></tr></thead>`;

    const table=(title,list)=>U.sectionCard(title,`<div class="overflow-x-auto"><table class="w-full">${head}<tbody class="divide-y divide-gray-50">${list.map(invRow).join("")}</tbody></table></div>`,
      `<a class="text-xs font-medium text-indigo-600 hover:underline" href="#">Export CSV</a>`);

    const revenueSummary=U.sectionCard("Revenue summary",`<div class="px-5 pb-5 pt-4"><div class="flex items-baseline gap-2"><span class="text-2xl font-semibold">${U.money(totalPaid)}</span><span class="text-xs font-medium text-emerald-600">▲ 11%</span></div><p class="text-xs text-gray-400">Collected over last 16 days</p>${U.lineChart(H.revenueTrend,"#059669")}</div>`);

    const content=`<div class="space-y-5">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div><h2 class="text-xl font-semibold tracking-tight">Billing</h2><p class="text-sm text-gray-500">Invoices, payments & revenue</p></div>
        <button class="flex items-center gap-2 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"><i data-lucide="plus" class="size-4"></i>Create invoice</button>
      </div>
      ${kpis}
      ${revenueSummary}
      ${table(`Outstanding invoices <span class="ml-1 rounded-full bg-red-50 px-2 py-0.5 text-xs font-medium text-red-600">${outstanding.length}</span>`,outstanding)}
      ${table("Recent payments",paid.slice(0,8))}
    </div>`;
    renderLayout("billing","Billing",content);
  </script>
</body>
</html>
