<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']},colors:{indigo:{600:'#4F46E5'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:8px}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/shell.js"></script>
  <script>
    const H=window.HOTEL, U=window.UI;
    const tabs=["General","Hotel Profile","Staff","Roles","Billing","Notifications"];
    let active="General";
    const inp=`class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100"`;
    const field=(l,el,hint)=>`<div class="grid grid-cols-1 gap-2 border-b border-gray-50 py-4 sm:grid-cols-3"><div><p class="text-sm font-medium text-gray-900">${l}</p>${hint?`<p class="text-xs text-gray-400">${hint}</p>`:""}</div><div class="sm:col-span-2">${el}</div></div>`;
    const toggle=(on)=>`<button class="relative h-6 w-11 rounded-full transition ${on?'bg-indigo-600':'bg-gray-200'}"><span class="absolute top-0.5 size-5 rounded-full bg-white shadow transition ${on?'left-[22px]':'left-0.5'}"></span></button>`;

    function card(body){return `<div class="rounded-xl border border-gray-200 bg-white p-5 shadow-[0_1px_2px_rgba(16,24,40,0.04)]">${body}</div>`;}

    function panel(){
      switch(active){
        case "General": return card(`<h3 class="text-sm font-semibold text-gray-900">General preferences</h3><div class="mt-2">
          ${field("Workspace name",`<input ${inp} value="Grand Marina Group"/>`)}
          ${field("Time zone",`<select ${inp}><option>(GMT-05:00) Eastern Time</option><option>(GMT+00:00) UTC</option></select>`)}
          ${field("Currency",`<select ${inp}><option>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option></select>`)}
          ${field("Date format",`<select ${inp}><option>MMM D, YYYY</option><option>DD/MM/YYYY</option></select>`)}</div>`);
        case "Hotel Profile": return card(`<h3 class="text-sm font-semibold text-gray-900">Hotel profile</h3><div class="mt-2">
          ${field("Property name",`<input ${inp} value="Grand Marina Hotel"/>`)}
          ${field("Address",`<input ${inp} value="120 Harbor View Blvd, Miami, FL"/>`)}
          ${field("Total rooms",`<input ${inp} value="50"/>`)}
          ${field("Check-in / out",`<div class="flex gap-2"><input ${inp} value="15:00"/><input ${inp} value="11:00"/></div>`)}</div>`);
        case "Staff": return card(`<div class="flex items-center justify-between"><h3 class="text-sm font-semibold text-gray-900">Staff members</h3><button class="rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-medium text-white">Invite</button></div>
          <ul class="mt-3 divide-y divide-gray-50">${["Maria S.,Housekeeping Lead,maria@grandmarina.com","Kofi A.,Front Desk,kofi@grandmarina.com","Lena P.,Concierge,lena@grandmarina.com","Diego R.,Maintenance,diego@grandmarina.com"].map(s=>{const[n,r,e]=s.split(",");return `<li class="flex items-center gap-3 py-3"><span class="grid size-8 place-items-center rounded-full bg-indigo-100 text-xs font-semibold text-indigo-700">${n.split(" ").map(x=>x[0]).join("")}</span><div class="flex-1"><p class="text-sm font-medium text-gray-900">${n}</p><p class="text-xs text-gray-400">${e}</p></div><span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs text-gray-600">${r}</span></li>`;}).join("")}</ul>`);
        case "Roles": return card(`<h3 class="text-sm font-semibold text-gray-900">Roles & permissions</h3>
          <div class="mt-3 space-y-2">${["Administrator,Full access to all settings & data","Manager,Manage reservations, billing & staff","Front Desk,Check-in, check-out & guest profiles","Housekeeping,View & update room tasks"].map(s=>{const[r,d]=s.split(",");return `<div class="flex items-center justify-between rounded-lg border border-gray-100 px-4 py-3"><div><p class="text-sm font-medium text-gray-900">${r}</p><p class="text-xs text-gray-400">${d}</p></div><button class="text-xs font-medium text-indigo-600 hover:underline">Edit</button></div>`;}).join("")}</div>`);
        case "Billing": return card(`<h3 class="text-sm font-semibold text-gray-900">Subscription & billing</h3><div class="mt-3 rounded-xl border border-indigo-100 bg-indigo-50 p-4"><div class="flex items-center justify-between"><div><p class="text-sm font-semibold text-gray-900">Enterprise plan</p><p class="text-xs text-gray-500">Unlimited rooms · priority support</p></div><span class="text-lg font-semibold text-gray-900">$299<span class="text-xs font-normal text-gray-400">/mo</span></span></div></div>
          <div class="mt-2">${field("Payment method",`<div class="flex items-center gap-2 rounded-lg border border-gray-200 px-3 py-2 text-sm"><i data-lucide="credit-card" class="size-4 text-gray-400"></i>Visa ending in 4821</div>`)}${field("Billing email",`<input ${inp} value="finance@grandmarina.com"/>`)}</div>`);
        case "Notifications": return card(`<h3 class="text-sm font-semibold text-gray-900">Notifications</h3><div class="mt-2">
          ${["New reservation,Email when a booking is created,1","Payment received,Notify on successful payments,1","Check-in reminders,Daily arrivals summary,1","Housekeeping alerts,High-priority task notifications,0","Weekly report,Performance digest every Monday,1"].map(s=>{const[t,d,on]=s.split(",");return field(t,toggle(on==="1"),d);}).join("")}</div>`);
      }
    }

    function render(){
      const tabBtns=tabs.map(t=>`<button data-t="${t}" class="whitespace-nowrap rounded-lg px-3 py-1.5 text-sm font-medium ${t===active?'bg-gray-900 text-white':'text-gray-600 hover:bg-gray-100'}">${t}</button>`).join("");
      const content=`<div class="space-y-5">
        <div><h2 class="text-xl font-semibold tracking-tight">Settings</h2><p class="text-sm text-gray-500">Manage your workspace & property configuration</p></div>
        <div class="flex flex-wrap gap-1 overflow-x-auto rounded-xl border border-gray-200 bg-white p-1.5">${tabBtns}</div>
        <div class="max-w-3xl">${panel()}
          <div class="mt-4 flex justify-end gap-2"><button class="rounded-lg border border-gray-200 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button><button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">Save changes</button></div>
        </div>
      </div>`;
      renderLayout("settings","Settings",content);
      document.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{active=b.dataset.t;render();});
    }
    render();
  </script>
</body>
</html>
