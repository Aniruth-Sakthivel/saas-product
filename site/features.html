<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Features · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body class="bg-[#FAFAFA] text-gray-900 antialiased">
  <div id="navbar"></div>
  <section class="px-5 pb-14 pt-16 text-center sm:px-8 sm:pt-24">
    <div class="mx-auto max-w-3xl" id="head"></div>
  </section>
  <section class="px-5 pb-24 sm:px-8">
    <div class="mx-auto max-w-7xl space-y-6" id="rows"></div>
  </section>
  <section class="px-5 pb-24 sm:px-8">
    <div class="mx-auto max-w-7xl"><div id="gridHead"></div>
    <div class="mt-12 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3" id="grid"></div></div>
  </section>
  <div id="footer"></div>
  <script src="assets/site.js"></script>
  <script>
    const S=window.SITE;
    document.getElementById("head").innerHTML = S.badge("Features","layout-grid")+S.sectionHead({title:"Everything you need to run a modern hotel",sub:"A complete, beautifully designed operations suite — from booking to checkout and beyond."});
    const rows=[
      ["calendar-check","Reservations","Centralized booking management","Sync availability across direct, OTA, and walk-in channels in real time. Drag-and-drop calendar, group bookings, and instant confirmations.",["Channel manager sync","Group & corporate bookings","Automated confirmations","Overbooking protection"]],
      ["concierge-bell","Front Desk","Operations command center","Check guests in and out in seconds, handle walk-ins, collect payments, and see arrivals, departures, and in-house guests at a glance.",["One-click check-in / out","Walk-in bookings","Payment collection","Live in-house view"]],
      ["sparkles","Housekeeping","Live task management","Assign rooms, set priorities, and track cleaning status on a real-time board that keeps housekeeping and front desk in sync.",["Kanban task board","Staff assignment","Inspection workflow","Priority flags"]],
      ["brain-circuit","AI Insights","Decisions, automated","Forecast occupancy, optimize pricing, and ask plain-language questions about your property with the built-in AI assistant.",["Occupancy forecasting","Dynamic pricing hints","Natural-language queries","Revenue analysis"]],
    ];
    document.getElementById("rows").innerHTML = rows.map((r,idx)=>{
      const [i,t,h,d,feats]=r; const flip=idx%2===1;
      const text=`<div class="${flip?'lg:order-2':''}"><span class="grid size-11 place-items-center rounded-xl bg-indigo-50 text-indigo-600"><i data-lucide="${i}" class="size-5"></i></span>
        <p class="mt-4 text-sm font-semibold text-indigo-600">${t}</p><h3 class="mt-1 text-2xl font-semibold tracking-tight">${h}</h3>
        <p class="mt-3 text-gray-500">${d}</p>
        <ul class="mt-5 grid grid-cols-1 gap-2.5 sm:grid-cols-2">${feats.map(f=>`<li class="flex items-center gap-2 text-sm text-gray-700"><i data-lucide="check" class="size-4 text-emerald-600"></i>${f}</li>`).join("")}</ul></div>`;
      const visual=`<div class="${flip?'lg:order-1':''} rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="space-y-3">${[...Array(4)].map((_,k)=>`<div class="flex items-center gap-3 rounded-xl border border-gray-100 bg-gray-50/60 p-3"><span class="grid size-8 place-items-center rounded-lg bg-indigo-100 text-indigo-600"><i data-lucide="${i}" class="size-4"></i></span><div class="flex-1"><div class="h-2.5 w-1/3 rounded bg-gray-200"></div><div class="mt-1.5 h-2 w-1/2 rounded bg-gray-100"></div></div><span class="size-5 rounded-full bg-emerald-100"></span></div>`).join("")}</div></div>`;
      return `<div class="grid grid-cols-1 items-center gap-10 rounded-3xl border border-gray-100 bg-white p-8 lg:grid-cols-2">${text}${visual}</div>`;
    }).join("");

    document.getElementById("gridHead").innerHTML = S.sectionHead({eyebrow:"And more",title:"Built for the whole property"});
    const more=[["receipt","Billing & GST","GST-compliant invoices, payments, and revenue tracking."],["users","Guest CRM","Profiles, stay history, preferences, and notes."],["bar-chart-3","Reports","Occupancy, revenue, ADR, and RevPAR analytics."],["message-circle","WhatsApp","Automated guest messaging and reminders."],["shield-check","Security","Role-based access, SSO, and audit logs."],["smartphone","Mobile ready","Manage your property from any device."]];
    document.getElementById("grid").innerHTML = more.map(([i,t,d])=>`<div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm transition hover:shadow-lg"><span class="grid size-10 place-items-center rounded-xl bg-indigo-50 text-indigo-600"><i data-lucide="${i}" class="size-5"></i></span><h3 class="mt-4 font-semibold">${t}</h3><p class="mt-1.5 text-sm text-gray-500">${d}</p></div>`).join("");
    mountChrome("Features");
  </script>
</body>
</html>
