<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body class="bg-[#FAFAFA] text-gray-900 antialiased">
  <div id="navbar"></div>
  <section class="px-5 pb-14 pt-16 text-center sm:px-8 sm:pt-24"><div class="mx-auto max-w-3xl" id="head"></div></section>
  <section class="px-5 sm:px-8"><div class="mx-auto grid max-w-7xl grid-cols-1 gap-6 lg:grid-cols-3" id="grid"></div></section>
  <section class="px-5 py-24 sm:px-8">
    <div class="mx-auto max-w-5xl"><div id="cmpHead"></div>
      <div class="mt-10 overflow-x-auto rounded-2xl border border-gray-200 bg-white shadow-sm"><table class="w-full text-sm" id="cmp"></table></div>
    </div>
  </section>
  <section class="px-5 pb-24 sm:px-8"><div class="mx-auto max-w-3xl"><div id="faqHead"></div><div class="mt-10 space-y-3" id="faq"></div></div></section>
  <div id="footer"></div>
  <script src="assets/site.js"></script>
  <script>
    const S=window.SITE;
    document.getElementById("head").innerHTML = S.badge("Pricing","tag")+S.sectionHead({title:"Pricing that scales with you",sub:"Transparent plans for properties of every size. Start with a 14-day free trial."});
    const plans=[
      ["Starter","$49","For small & boutique stays",["Up to 20 rooms","Reservations & front desk","Guest CRM","Email support"],false],
      ["Professional","$129","For growing hotels",["Up to 100 rooms","Everything in Starter","Housekeeping & billing","AI Insights & reports","WhatsApp automation","Priority support"],true],
      ["Enterprise","Custom","For groups & chains",["Unlimited rooms & properties","Everything in Professional","Dedicated success manager","SSO & advanced security","Custom integrations","99.9% uptime SLA"],false],
    ];
    document.getElementById("grid").innerHTML = plans.map(([n,p,d,feats,hl])=>`
      <div class="relative flex flex-col rounded-2xl border ${hl?'border-indigo-600 shadow-xl shadow-indigo-600/10':'border-gray-200 shadow-sm'} bg-white p-7">
        ${hl?'<span class="absolute -top-3 left-1/2 -translate-x-1/2 rounded-full bg-gradient-to-br from-indigo-600 to-violet-600 px-3 py-1 text-xs font-semibold text-white">Most popular</span>':''}
        <h3 class="text-lg font-semibold">${n}</h3><p class="mt-1 text-sm text-gray-500">${d}</p>
        <div class="mt-5 flex items-baseline gap-1"><span class="text-4xl font-semibold tracking-tight">${p}</span>${p!=="Custom"?'<span class="text-sm text-gray-400">/month</span>':''}</div>
        <a href="signup.html" class="mt-6 rounded-xl px-4 py-2.5 text-center text-sm font-semibold transition ${hl?'bg-gradient-to-br from-indigo-600 to-violet-600 text-white hover:opacity-95':'border border-gray-200 text-gray-800 hover:bg-gray-50'}">${n==="Enterprise"?"Contact sales":"Start free trial"}</a>
        <ul class="mt-7 space-y-3">${feats.map(f=>`<li class="flex items-start gap-2.5 text-sm text-gray-600"><i data-lucide="check" class="mt-0.5 size-4 shrink-0 text-emerald-600"></i>${f}</li>`).join("")}</ul>
      </div>`).join("");

    document.getElementById("cmpHead").innerHTML = S.sectionHead({eyebrow:"Compare",title:"Compare plans in detail"});
    const rows=[["Rooms","20","100","Unlimited"],["Properties","1","3","Unlimited"],["Reservations & Front Desk","y","y","y"],["Housekeeping board","-","y","y"],["Billing & GST invoices","-","y","y"],["AI Insights & Assistant","-","y","y"],["WhatsApp automation","-","y","y"],["Advanced reports","-","y","y"],["SSO & audit logs","-","-","y"],["Dedicated manager","-","-","y"],["Support","Email","Priority","24/7 + SLA"]];
    const cell=(v)=> v==="y"?'<i data-lucide="check" class="mx-auto size-4 text-emerald-600"></i>': v==="-"?'<span class="text-gray-300">—</span>':v;
    document.getElementById("cmp").innerHTML = `
      <thead><tr class="border-b border-gray-100 bg-gray-50/60 text-left"><th class="px-5 py-3 font-medium text-gray-500">Feature</th><th class="px-5 py-3 text-center font-medium text-gray-500">Starter</th><th class="px-5 py-3 text-center font-semibold text-indigo-600">Professional</th><th class="px-5 py-3 text-center font-medium text-gray-500">Enterprise</th></tr></thead>
      <tbody class="divide-y divide-gray-50">${rows.map(([f,a,b,c])=>`<tr><td class="px-5 py-3 text-gray-700">${f}</td><td class="px-5 py-3 text-center text-gray-600">${cell(a)}</td><td class="bg-indigo-50/30 px-5 py-3 text-center font-medium text-gray-900">${cell(b)}</td><td class="px-5 py-3 text-center text-gray-600">${cell(c)}</td></tr>`).join("")}</tbody>`;

    document.getElementById("faqHead").innerHTML = S.sectionHead({title:"Pricing questions"});
    const faqs=[["Is there a free trial?","Yes — 14 days of full Professional access, no credit card required."],["Can I change plans later?","Absolutely. Upgrade or downgrade anytime; changes are prorated."],["Do you offer annual billing?","Yes, annual billing saves two months versus monthly."],["What payment methods do you accept?","All major cards, UPI, and bank transfer for annual plans."]];
    document.getElementById("faq").innerHTML = faqs.map(([q,a])=>`<div data-accordion class="rounded-xl border border-gray-200 bg-white"><button class="flex w-full items-center justify-between gap-4 px-5 py-4 text-left"><span class="text-sm font-medium">${q}</span><i data-lucide="chevron-down" data-chevron class="size-4 shrink-0 text-gray-400 transition"></i></button><div data-body class="hidden px-5 pb-4 text-sm text-gray-500">${a}</div></div>`).join("");
    mountChrome("Pricing");
  </script>
</body>
</html>
