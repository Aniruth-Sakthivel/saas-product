<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Front Desk · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']},colors:{indigo:{600:'#4F46E5'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:8px}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/shell.js"></script>
  <script>
    const H = window.HOTEL, U = window.UI;
    const arrivals = H.reservations.filter(r=>r.status==="Confirmed"||r.status==="Pending").slice(0,6);
    const departures = H.reservations.filter(r=>r.status==="Checked-in").slice(0,5);
    const inhouse = H.rooms.filter(r=>r.status==="Occupied").slice(0,8);

    const quick = [
      ["log-in","Check-in guest","Process a guest arrival","indigo"],
      ["log-out","Check-out guest","Settle & release a room","emerald"],
      ["user-plus","Walk-in booking","Create an on-the-spot stay","violet"],
      ["credit-card","Collect payment","Charge an open balance","amber"],
    ];
    const quickCards = `<div class="grid grid-cols-2 gap-4 lg:grid-cols-4">${quick.map(([i,t,d,c])=>`
      <button class="group flex flex-col items-start gap-3 rounded-xl border border-gray-200 bg-white p-5 text-left shadow-[0_1px_2px_rgba(16,24,40,0.04)] transition hover:border-${c}-200 hover:shadow-md">
        <span class="grid size-10 place-items-center rounded-lg bg-${c}-50 text-${c}-600 transition group-hover:scale-105"><i data-lucide="${i}" class="size-5"></i></span>
        <div><p class="text-sm font-semibold text-gray-900">${t}</p><p class="text-xs text-gray-400">${d}</p></div></button>`).join("")}</div>`;

    const list=(items,render)=>`<ul class="divide-y divide-gray-50">${items.map(render).join("")}</ul>`;

    const arrivalsCard=U.sectionCard(`Today's arrivals <span class="ml-1 rounded-full bg-indigo-50 px-2 py-0.5 text-xs font-medium text-indigo-600">${arrivals.length}</span>`,
      list(arrivals,r=>`<li class="flex items-center gap-3 px-5 py-3">${U.avatar(r.initials,r.vip)}
        <div class="min-w-0 flex-1"><p class="truncate text-sm font-medium text-gray-900">${r.guest}</p><p class="text-xs text-gray-400">Room ${r.room} · ${r.nights} nts · ${r.source}</p></div>
        <button class="rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-indigo-700">Check in</button></li>`));

    const departuresCard=U.sectionCard(`Today's departures <span class="ml-1 rounded-full bg-amber-50 px-2 py-0.5 text-xs font-medium text-amber-600">${departures.length}</span>`,
      list(departures,r=>`<li class="flex items-center gap-3 px-5 py-3">${U.avatar(r.initials,r.vip)}
        <div class="min-w-0 flex-1"><p class="truncate text-sm font-medium text-gray-900">${r.guest}</p><p class="text-xs text-gray-400">Room ${r.room} · ${U.money(r.total)} ${r.payment==="Paid"?"settled":"due"}</p></div>
        <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50">Check out</button></li>`));

    const inhouseCard=U.sectionCard(`In-house guests <span class="ml-1 rounded-full bg-emerald-50 px-2 py-0.5 text-xs font-medium text-emerald-600">${inhouse.length}</span>`,
      list(inhouse,r=>`<li class="flex items-center gap-3 px-5 py-3"><span class="grid size-8 place-items-center rounded-lg bg-gray-100 text-xs font-semibold text-gray-600">${r.number}</span>
        <div class="min-w-0 flex-1"><p class="truncate text-sm font-medium text-gray-900">${r.guest||"—"}</p><p class="text-xs text-gray-400">${r.type} · Floor ${r.floor}</p></div>
        ${U.badge(r.status)}</li>`));

    const content=`<div class="space-y-5">
      <div><h2 class="text-xl font-semibold tracking-tight">Front Desk</h2><p class="text-sm text-gray-500">Operational center · Saturday, Jun 28, 2026</p></div>
      ${quickCards}
      <div class="grid grid-cols-1 gap-4 xl:grid-cols-3">${arrivalsCard}${departuresCard}${inhouseCard}</div>
    </div>`;
    renderLayout("front-desk","Front Desk",content);
  </script>
</body>
</html>
