<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rooms · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']},colors:{indigo:{600:'#4F46E5'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:8px}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/shell.js"></script>
  <script>
    const H=window.HOTEL, U=window.UI;
    const accent={Available:"emerald",Occupied:"indigo",Reserved:"violet",Cleaning:"amber",Maintenance:"red"};
    let floor="All", status="All";

    function card(r){
      const c=accent[r.status];
      return `<div class="group rounded-xl border border-gray-200 bg-white p-4 shadow-[0_1px_2px_rgba(16,24,40,0.04)] transition hover:shadow-md">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3"><span class="grid size-11 place-items-center rounded-xl bg-${c}-50 text-${c}-600"><i data-lucide="bed-double" class="size-5"></i></span>
          <div><p class="text-base font-semibold text-gray-900">Room ${r.number}</p><p class="text-xs text-gray-400">${r.type}</p></div></div>
          ${U.badge(r.status)}
        </div>
        <dl class="mt-4 space-y-2 border-t border-gray-50 pt-3 text-sm">
          <div class="flex justify-between"><dt class="text-gray-400">Floor</dt><dd class="font-medium text-gray-700">${r.floor}</dd></div>
          <div class="flex justify-between"><dt class="text-gray-400">Guest</dt><dd class="font-medium text-gray-700">${r.guest||"<span class='text-gray-300'>Vacant</span>"}</dd></div>
          <div class="flex justify-between"><dt class="text-gray-400">Beds</dt><dd class="font-medium text-gray-700">${r.beds}</dd></div>
        </dl>
        <div class="mt-3 flex items-center justify-between border-t border-gray-50 pt-3">
          <span class="text-base font-semibold text-gray-900">${U.money(r.price)}<span class="text-xs font-normal text-gray-400">/night</span></span>
          <button class="rounded-lg border border-gray-200 px-2.5 py-1 text-xs font-medium text-gray-600 opacity-0 transition group-hover:opacity-100 hover:bg-gray-50">Manage</button>
        </div></div>`;
    }

    function render(){
      const floors=["All",1,2,3,4,5];
      const statuses=["All","Available","Occupied","Reserved","Cleaning","Maintenance"];
      let list=H.rooms;
      if(floor!=="All") list=list.filter(r=>r.floor==floor);
      if(status!=="All") list=list.filter(r=>r.status===status);

      const fbtns=floors.map(f=>`<button data-floor="${f}" class="rounded-lg px-3 py-1.5 text-sm font-medium ${f==floor?'bg-gray-900 text-white':'text-gray-600 hover:bg-gray-100'}">${f==="All"?"All floors":"Floor "+f}</button>`).join("");
      const sbtns=statuses.map(s=>`<button data-status="${s}" class="flex items-center gap-1.5 rounded-lg border px-2.5 py-1.5 text-sm font-medium ${s===status?'border-indigo-200 bg-indigo-50 text-indigo-700':'border-gray-200 text-gray-600 hover:bg-gray-50'}">${s!=="All"?U.dot(s):''}${s}</button>`).join("");

      const content=`<div class="space-y-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div><h2 class="text-xl font-semibold tracking-tight">Rooms</h2><p class="text-sm text-gray-500">${H.rooms.length} rooms · ${H.rooms.filter(r=>r.status==="Available").length} available now</p></div>
          <button class="flex items-center gap-2 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"><i data-lucide="plus" class="size-4"></i>Add room</button>
        </div>
        <div class="flex flex-wrap items-center gap-2 rounded-xl border border-gray-200 bg-white p-3">
          <div class="flex flex-wrap gap-1">${fbtns}</div><span class="mx-1 h-5 w-px bg-gray-200"></span><div class="flex flex-wrap gap-1.5">${sbtns}</div>
        </div>
        ${list.length?`<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">${list.map(card).join("")}</div>`:U.emptyState("bed-double","No rooms","No rooms match these filters.")}
      </div>`;
      renderLayout("rooms","Rooms",content);
      document.querySelectorAll("[data-floor]").forEach(b=>b.onclick=()=>{floor=b.dataset.floor;render();});
      document.querySelectorAll("[data-status]").forEach(b=>b.onclick=()=>{status=b.dataset.status;render();});
    }
    render();
  </script>
</body>
</html>
