<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Housekeeping · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']},colors:{indigo:{600:'#4F46E5'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:8px}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/shell.js"></script>
  <script>
    const H=window.HOTEL, U=window.UI;
    const colMeta={Pending:["circle-dashed","gray"],"In Progress":["loader","indigo"],Inspection:["search-check","amber"],Completed:["check-circle-2","emerald"]};

    function taskCard(t){
      return `<div class="cursor-grab rounded-xl border border-gray-200 bg-white p-3.5 shadow-[0_1px_2px_rgba(16,24,40,0.04)] transition hover:shadow-md">
        <div class="flex items-center justify-between"><span class="text-sm font-semibold text-gray-900">Room ${t.room}</span>${U.badge(t.priority)}</div>
        <p class="mt-1 text-xs text-gray-500">${t.task} · ${t.type}</p>
        <div class="mt-3 flex items-center justify-between border-t border-gray-50 pt-2.5">
          <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="grid size-5 place-items-center rounded-full bg-indigo-100 text-[9px] font-semibold text-indigo-700">${t.staff.split(" ").map(s=>s[0]).join("")}</span>${t.staff}</span>
          <span class="flex items-center gap-1 text-xs text-gray-400"><i data-lucide="clock" class="size-3.5"></i>${t.due}</span>
        </div></div>`;
    }

    const board=`<div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">${H.hkCols.map(col=>{
      const items=H.housekeeping.filter(t=>t.col===col);
      const [icon,color]=colMeta[col];
      return `<div class="flex flex-col rounded-xl border border-gray-200 bg-gray-50/50">
        <header class="flex items-center gap-2 px-4 py-3"><i data-lucide="${icon}" class="size-4 text-${color}-500"></i><h3 class="text-sm font-semibold text-gray-900">${col}</h3><span class="ml-auto rounded-full bg-white px-2 py-0.5 text-xs font-medium text-gray-500 ring-1 ring-gray-200">${items.length}</span></header>
        <div class="flex-1 space-y-3 px-3 pb-3">${items.length?items.map(taskCard).join(""):'<p class="px-2 py-8 text-center text-xs text-gray-400">No tasks</p>'}
          <button class="flex w-full items-center justify-center gap-1.5 rounded-lg border border-dashed border-gray-300 py-2 text-xs font-medium text-gray-400 hover:border-gray-400 hover:text-gray-600"><i data-lucide="plus" class="size-3.5"></i>Add task</button></div>
      </div>`;}).join("")}</div>`;

    const stats=[["Total tasks",H.housekeeping.length,"clipboard-list"],["In progress",H.housekeeping.filter(t=>t.col==="In Progress").length,"loader"],["High priority",H.housekeeping.filter(t=>t.priority==="High").length,"alert-triangle"],["Completed today",H.housekeeping.filter(t=>t.col==="Completed").length,"check-circle-2"]];
    const statRow=`<div class="grid grid-cols-2 gap-4 lg:grid-cols-4">${stats.map(([l,v,i])=>`<div class="flex items-center gap-3 rounded-xl border border-gray-200 bg-white p-4"><span class="grid size-9 place-items-center rounded-lg bg-indigo-50 text-indigo-600"><i data-lucide="${i}" class="size-4.5"></i></span><div><p class="text-xl font-semibold text-gray-900">${v}</p><p class="text-xs text-gray-400">${l}</p></div></div>`).join("")}</div>`;

    const content=`<div class="space-y-5">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div><h2 class="text-xl font-semibold tracking-tight">Housekeeping</h2><p class="text-sm text-gray-500">Task board · ${H.housekeeping.length} active assignments</p></div>
        <button class="flex items-center gap-2 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"><i data-lucide="plus" class="size-4"></i>New task</button>
      </div>
      ${statRow}
      ${board}
    </div>`;
    renderLayout("housekeeping","Housekeeping",content);
  </script>
</body>
</html>
