<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guests · HotelOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif']},colors:{indigo:{600:'#4F46E5'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:8px}.size-4\.5{width:1.125rem;height:1.125rem}</style>
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/shell.js"></script>
  <script>
    const H=window.HOTEL, U=window.UI;

    function profile(g){
      const stat=(l,v)=>`<div class="rounded-xl border border-gray-200 p-3 text-center"><p class="text-lg font-semibold text-gray-900">${v}</p><p class="text-xs text-gray-400">${l}</p></div>`;
      const stays=H.reservations.slice(0,4);
      openDrawer("Guest profile",`<div class="space-y-6 p-5">
        <div class="flex flex-col items-center text-center">
          <span class="relative grid size-16 place-items-center rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 text-xl font-semibold text-white">${g.initials}${g.vip?'<span class="absolute -right-1 -top-1 grid size-5 place-items-center rounded-full bg-amber-400 text-white ring-2 ring-white"><i data-lucide="star" class="size-3"></i></span>':''}</span>
          <p class="mt-3 text-lg font-semibold text-gray-900">${g.name}</p><p class="text-sm text-gray-400">${g.city}</p>
          ${g.vip?'<span class="mt-1 rounded-full bg-amber-50 px-2 py-0.5 text-xs font-medium text-amber-700">VIP · Gold member</span>':''}
        </div>
        <div class="grid grid-cols-3 gap-3">${stat("Visits",g.visits)}${stat("Total spend",U.money(g.totalSpend))}${stat("Last stay",g.lastStay.split(",")[0])}</div>
        <div><h4 class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400">Personal info</h4>
          <dl class="rounded-xl border border-gray-200 divide-y divide-gray-50 px-4">
            ${[["Phone",g.phone],["Email",g.email],["Location",g.city]].map(([l,v])=>`<div class="flex justify-between py-2.5"><dt class="text-sm text-gray-500">${l}</dt><dd class="text-sm font-medium text-gray-900">${v}</dd></div>`).join("")}</dl></div>
        <div><h4 class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400">Preferences</h4>
          <div class="flex flex-wrap gap-1.5">${g.preferences.map(p=>`<span class="rounded-full bg-indigo-50 px-2.5 py-1 text-xs font-medium text-indigo-700">${p}</span>`).join("")}</div></div>
        <div><h4 class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400">Stay history</h4>
          <ul class="space-y-2">${stays.map(s=>`<li class="flex items-center gap-3 rounded-lg border border-gray-100 px-3 py-2"><span class="grid size-8 place-items-center rounded-lg bg-gray-100 text-xs font-semibold text-gray-600">${s.room}</span><div class="flex-1"><p class="text-sm font-medium text-gray-900">${s.roomType}</p><p class="text-xs text-gray-400">${s.checkInStr} → ${s.checkOutStr}</p></div><span class="text-sm font-semibold">${U.money(s.total)}</span></li>`).join("")}</ul></div>
        <div><h4 class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400">Notes</h4>
          <p class="rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm text-gray-600">${g.notes}</p></div>
      </div>`,"max-w-md");
    }

    let q="";
    function render(){
      const list=H.guests.filter(g=>g.name.toLowerCase().includes(q.toLowerCase()));
      const rows=list.map((g,i)=>`<tr class="cursor-pointer hover:bg-gray-50" data-i="${i}">
        <td class="px-5 py-3"><div class="flex items-center gap-2.5">${U.avatar(g.initials,g.vip)}<div><p class="text-sm font-medium text-gray-900">${g.name}</p><p class="text-xs text-gray-400">${g.id}</p></div></div></td>
        <td class="whitespace-nowrap px-5 py-3 text-sm text-gray-600">${g.phone}</td>
        <td class="px-5 py-3 text-sm text-gray-600">${g.email}</td>
        <td class="px-5 py-3 text-sm text-gray-700">${g.visits}</td>
        <td class="px-5 py-3 text-sm font-medium text-gray-900">${U.money(g.totalSpend)}</td>
        <td class="whitespace-nowrap px-5 py-3 text-sm text-gray-600">${g.lastStay}</td>
        <td class="px-5 py-3"><div class="flex flex-wrap gap-1">${g.preferences.slice(0,2).map(p=>`<span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs text-gray-600">${p}</span>`).join("")}</div></td>
      </tr>`).join("");

      const content=`<div class="space-y-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div><h2 class="text-xl font-semibold tracking-tight">Guests</h2><p class="text-sm text-gray-500">${H.guests.length} guests · ${H.guests.filter(g=>g.vip).length} VIPs</p></div>
          <div class="flex gap-2"><div class="flex items-center gap-2 rounded-lg border border-gray-200 px-2.5 py-1.5 text-sm"><i data-lucide="search" class="size-4 text-gray-400"></i><input id="q" value="${q}" placeholder="Search guests…" class="w-48 bg-transparent focus:outline-none"/></div>
          <button class="flex items-center gap-2 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"><i data-lucide="user-plus" class="size-4"></i>Add guest</button></div>
        </div>
        <div class="overflow-x-auto rounded-xl border border-gray-200 bg-white shadow-[0_1px_2px_rgba(16,24,40,0.04)]">
          <table class="w-full"><thead><tr class="border-b border-gray-100 bg-gray-50/60 text-left text-xs font-medium uppercase tracking-wide text-gray-400">
            <th class="px-5 py-2.5">Guest</th><th class="px-5 py-2.5">Phone</th><th class="px-5 py-2.5">Email</th><th class="px-5 py-2.5">Visits</th><th class="px-5 py-2.5">Total spend</th><th class="px-5 py-2.5">Last stay</th><th class="px-5 py-2.5">Preferences</th></tr></thead>
          <tbody class="divide-y divide-gray-50">${list.length?rows:`<tr><td colspan="7">${U.emptyState("users","No guests found","Try a different search term.")}</td></tr>`}</tbody></table>
        </div>
      </div>`;
      renderLayout("guests","Guests",content);
      const inp=document.getElementById("q");
      inp.oninput=(e)=>{q=e.target.value;render();setTimeout(()=>{const f=document.getElementById("q");f.focus();f.setSelectionRange(f.value.length,f.value.length);},0);};
      document.querySelectorAll("tbody tr[data-i]").forEach(tr=>tr.onclick=()=>profile(list[+tr.dataset.i]));
    }
    render();
  </script>
</body>
</html>
